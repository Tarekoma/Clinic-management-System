server {
    server_name hakim-app.cloud www.hakim-app.cloud;

    location / {
        proxy_pass http://192.168.1.13:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

location /webmail/ {
    proxy_pass http://192.168.1.13/webmail/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/hakim-app.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/hakim-app.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.hakim-app.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = hakim-app.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name hakim-app.cloud www.hakim-app.cloud;
    listen 80;
    return 404; # managed by Certbot




}
