server {
    server_name ai-api.hakim-app.cloud;

    location / {
        proxy_pass http://192.168.1.13:8080; 
        proxy_http_version 1.1;
#        proxy_set_header Upgrade $http_upgrade;
#        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 3600;
        #client_max_body_size 50M;
#       proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        client_max_body_size 100M;

        proxy_buffering off;
        proxy_request_buffering off;

}

listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ai-api.hakim-app.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ai-api.hakim-app.cloud/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = ai-api.hakim-app.cloud) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name ai-api.hakim-app.cloud;
    listen 80;
    return 404; # managed by Certbot


}
