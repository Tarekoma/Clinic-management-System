server {
    listen 80;
    server_name wfautomation.crocoit.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name n8n-ai.hakim-app.cloud;

#    ssl_certificate /etc/letsencrypt/live/wfautomation.crocoit.com/fullchain.pem;
#    ssl_certificate_key /etc/letsencrypt/live/wfautomation.crocoit.com/privkey.pem;

    location / {
        proxy_buffering off;
        gzip off;
        proxy_http_version 1.1;
        proxy_pass http://192.168.1.13:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";


    }

    location /rest/push {
        proxy_buffering off;
        gzip off;
        proxy_http_version 1.1;   
        proxy_pass http://192.168.1.13:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
 
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";


    }

    ssl_certificate /etc/letsencrypt/live/n8n-ai.hakim-app.cloud/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/n8n-ai.hakim-app.cloud/privkey.pem; # managed by Certbot
}
